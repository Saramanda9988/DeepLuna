server:
  tomcat:
    max-connections: 10000
  port: ${server.port:8090}

spring:
  application:
    name: ${application.name}
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  datasource:
    url: jdbc:postgresql://${application.pgsql.ip}:${application.pgsql.port}/${application.pgsql.db}?currentSchema=${application.pgsql.schema}&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${application.pgsql.username}
    password: ${application.pgsql.password}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      api-key: ${openai.api-key:}
    deepseek:
      api-key: ${deepseek.api-key}
    zhipuai:
      api-key: ${zhipuai.api-key}
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        max-document-batch-size: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

application:
  pgsql:
    schema: ${application.pgsql.schema}

websearch:
  tavily:
    api:
      key: ${websearch.tavily.api-key}

auth:
  mode: ${auth.mode}
  jwt:
    secret: ${auth.jwt.secret}
    expiration-seconds: ${auth.jwt.expiration-seconds:86400}
